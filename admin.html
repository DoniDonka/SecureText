<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>SecureText Admin</title>
  <link rel="stylesheet" href="style.css" />
  <!-- Firebase v8 CDN -->
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
</head>
<body>
  <div class="wrap">
    <div class="shell" style="width:min(1100px,96vw)">
      <div class="topbar">
        <div class="brand">SECURETEXT <span class="muted">ADMIN</span></div>
        <a class="pill" href="index.html" style="text-decoration:none">Back</a>
      </div>

      <div id="admin-login" class="card">
        <h2>Admin Login</h2>
        <div class="muted">Login with your admin email + password.</div>

        <label style="display:block;margin-top:12px" for="adminEmail" class="muted">Email</label>
        <input id="adminEmail" type="email" autocomplete="username" />

        <label style="display:block;margin-top:12px" for="adminPassword" class="muted">Password</label>
        <input id="adminPassword" type="password" autocomplete="current-password" />

        <div class="row" style="margin-top:12px">
          <button id="loginBtn" class="primary" type="button">Login</button>
        </div>
        <div id="loginError" class="err"></div>
      </div>

      <div id="admin-dashboard" class="row" style="display:none; gap:14px; align-items:flex-start">
        <div class="card" style="flex:0 0 360px">
          <div class="row" style="align-items:center; justify-content:space-between">
            <div id="adminInfo" class="pill">Logged in</div>
            <button id="logoutBtn" class="danger" type="button" style="max-width:160px">Logout</button>
          </div>

          <h3 style="margin-top:14px">Select Class</h3>
          <div id="classError" class="err"></div>
          <div id="classButtons" class="row" style="margin-top:10px"></div>
        </div>

        <div id="admin-screen" class="card" style="display:none; flex:1 1 auto">
          <h3 id="classTitle">Managing:</h3>
          <div id="adminActionStatus" class="muted" style="margin-top:8px"></div>

          <div class="card" style="margin-top:12px">
            <div class="muted" style="font-weight:900;letter-spacing:.08em;margin-bottom:10px">CLASS CONTROLS</div>
            <div class="row">
              <button id="forceLogoutEveryoneBtn" class="danger" type="button">Force Logout</button>
              <button id="forceRerulesBtn" class="danger" type="button">Force Re-Rules</button>
              <button id="forceRefreshEveryoneBtn" class="danger" type="button">Force Refresh</button>
            </div>
            <div class="row" style="margin-top:10px">
              <input id="lockMessageInput" placeholder="Lock message (optional)..." />
              <button id="lockChatBtn" class="danger" type="button">Lock</button>
              <button id="unlockChatBtn" class="good" type="button">Unlock</button>
            </div>
            <div class="row" style="margin-top:10px">
              <button id="forceThemeNightBtn" class="primary" type="button">Theme Night</button>
              <button id="forceThemeDayBtn" class="primary" type="button">Theme Day</button>
              <button id="clearForcedThemeBtn" type="button">Clear Theme</button>
            </div>
            <div class="row" style="margin-top:10px">
              <button id="deleteAllChatBtn" class="danger" type="button">Delete ALL Chat</button>
              <button id="deleteAllAnnouncementsBtn" class="danger" type="button">Delete ALL Announcements</button>
              <button id="resetCommandsBtn" class="danger" type="button">Reset Commands</button>
              <button id="exportChatBtn" class="primary" type="button">Export Chat</button>
            </div>
            <div class="row" style="margin-top:10px">
              <input id="pinMessageInput" placeholder="Pinned message (shown at top of chat)…" style="flex:1;min-width:200px" />
              <button id="setPinBtn" class="primary" type="button">Set pinned</button>
              <button id="clearPinBtn" type="button">Clear pinned</button>
            </div>
          </div>

          <div id="extraControlsCard" class="card" style="margin-top:12px">
            <div class="muted" style="font-weight:900;letter-spacing:.08em;margin-bottom:10px">THEME PRESETS + DATA SAVER</div>
            <div class="row">
              <button id="presetNeonBtn" class="primary" type="button">Preset: Neon</button>
              <button id="presetEmeraldBtn" class="primary" type="button">Preset: Emerald</button>
              <button id="presetMonoBtn" class="primary" type="button">Preset: Mono</button>
              <button id="presetClearBtn" type="button">Clear Preset</button>
            </div>
            <div class="row" style="margin-top:10px">
              <button id="dataSaverOnBtn" class="good" type="button">Data Saver: ON</button>
              <button id="dataSaverOffBtn" class="danger" type="button">Data Saver: OFF</button>
            </div>
          </div>

          <h3 style="margin-top:14px">Pending Users</h3>
          <div class="row" style="margin-bottom:8px">
            <button id="bulkApproveBtn" class="good" type="button">Approve all</button>
            <button id="bulkRejectBtn" class="danger" type="button">Reject all</button>
          </div>
          <table id="pendingUsersTable" style="width:100%; border-collapse:collapse; margin-top:8px">
            <thead>
              <tr>
                <th style="text-align:left;padding:8px;opacity:.8">Name</th>
                <th style="text-align:left;padding:8px;opacity:.8">Approve</th>
                <th style="text-align:left;padding:8px;opacity:.8">Reject</th>
                <th style="text-align:left;padding:8px;opacity:.8">Ban</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>

          <h3 style="margin-top:14px">Banned Users</h3>
          <table id="bannedUsersTable" style="width:100%; border-collapse:collapse; margin-top:8px">
            <thead>
              <tr>
                <th style="text-align:left;padding:8px;opacity:.8">Name</th>
                <th style="text-align:left;padding:8px;opacity:.8">UserId</th>
                <th style="text-align:left;padding:8px;opacity:.8">Unban</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>

          <h3 style="margin-top:14px">Announcements</h3>
          <textarea id="announcementInput" placeholder="Type announcement…"></textarea>
          <div class="row" style="margin-top:10px">
            <button id="announceBtn" class="primary" type="button">Send</button>
          </div>
          <div id="announcementsList" style="margin-top:10px"></div>

          <h3 style="margin-top:14px">Live Chat</h3>
          <div id="chatMessages" class="card" style="max-height:280px; overflow:auto"></div>
          <div class="row" style="margin-top:10px">
            <input id="adminChatInput" placeholder="Admin message…" />
            <button id="adminSendBtn" class="primary" type="button" style="max-width:160px">Send</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="firebase.js"></script>
  <script src="admin.js"></script>
</body>
</html>
