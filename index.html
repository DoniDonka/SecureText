<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>SecureText (Recovery)</title>
  <link rel="stylesheet" href="style.css" />
  <!-- Firebase v8 CDN -->
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
</head>
<body>
  <div id="root">
    <section id="screen-class" class="screen active">
      <div class="wrap">
        <div class="topbar">
          <div class="brand">ST <span class="muted">SecureText</span></div>
          <button id="adminPathBtn" type="button">ADMIN PATH</button>
        </div>
        <div class="card">
          <h1>SecureText</h1>
          <div class="muted">Choose your class to get started.</div>
          <div id="classError" class="err"></div>
          <div id="classes" class="row">Loading…</div>
        </div>
      </div>
    </section>

    <section id="screen-pin" class="screen">
      <div class="wrap">
        <div class="card">
          <div class="row" style="justify-content:space-between;align-items:center">
            <div>
              <h2 style="margin:0">Enter PIN</h2>
              <div class="muted">Class: <span id="pinClassName"></span></div>
            </div>
            <button id="pinBackBtn" type="button">Back</button>
          </div>
          <div style="margin-top:10px">
            <input id="pinInput" placeholder="PIN" type="password" />
          </div>
          <div id="pinError" class="err"></div>
          <button id="pinContinueBtn" class="primary" type="button" style="margin-top:10px">Continue</button>
        </div>
      </div>
    </section>

    <section id="screen-name" class="screen">
      <div class="wrap">
        <div class="card">
          <div class="row" style="justify-content:space-between;align-items:center">
            <div>
              <h2 style="margin:0">Your Name</h2>
              <div class="muted">This is what others will see.</div>
            </div>
            <button id="nameBackBtn" type="button">Back</button>
          </div>
          <div style="margin-top:10px">
            <input id="nameInput" placeholder="Name" type="text" maxlength="28" />
          </div>
          <div id="nameError" class="err"></div>
          <button id="nameContinueBtn" class="primary" type="button" style="margin-top:10px">Request Access</button>
        </div>
      </div>
    </section>

    <section id="screen-wait" class="screen">
      <div class="wrap">
        <div class="card">
          <h2>Waiting for Approval</h2>
          <div id="waitStatus" class="muted">…</div>
          <button id="resetBtn" type="button" style="margin-top:10px">Start over</button>
        </div>
      </div>
    </section>

    <section id="screen-chat" class="screen">
      <div id="chat-screen" class="night">
        <div class="chat-header">
          <div>
            <h1 id="chatWelcome" style="margin:0">Welcome!</h1>
            <div id="chatSubtitle" class="muted">SecureText chat</div>
          </div>
          <div class="chat-controls">
            <button id="themeToggle" type="button">🌙</button>
            <button id="logoutBtn" type="button">Logout</button>
          </div>
        </div>

        <div id="announcementsBox">
          <strong>Announcements</strong>
          <div id="announcementsList"></div>
        </div>

        <div id="chatStatus" class="muted"></div>
        <div id="messages" class="messages"></div>
        <div id="typingIndicator" class="muted"></div>

        <div id="chat-input">
          <input id="msgInput" type="text" placeholder="Message…" autocomplete="off" />
          <button id="sendBtn" class="primary" type="button">Send</button>
        </div>
      </div>
    </section>
  </div>

  <script src="firebase.js"></script>
  <script src="app.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", function(){
      const btn=document.getElementById("adminPathBtn");
      if(btn) btn.onclick=()=>location.href="admin.html";
    });
  </script>
</body>
</html>
