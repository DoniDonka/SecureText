<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>SecureText</title>
  <link rel="stylesheet" href="style.css" />
  <!-- Firebase v8 CDN -->
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
</head>
<body>
  <div id="root">
    <section id="screen-class" class="screen active">
      <div class="wrap">
        <div class="shell">
          <div class="topbar">
            <div class="brand">ST <span class="muted">SecureText</span></div>
            <button id="adminPathBtn" class="pill" type="button">ADMIN PATH</button>
          </div>
          <div class="card">
            <h1>SecureText</h1>
            <div class="muted">Choose your class to get started.</div>
            <div id="classError" class="err"></div>
            <div id="classes" class="row" style="margin-top:12px">Loading…</div>
          </div>
        </div>
      </div>
    </section>

    <section id="screen-pin" class="screen">
      <div class="wrap">
        <div class="shell">
          <div class="card">
            <div class="row" style="justify-content:space-between;align-items:center">
              <div>
                <h2>Enter PIN</h2>
                <div class="muted">Class: <span id="pinClassName"></span></div>
              </div>
              <button id="pinBackBtn" type="button">Back</button>
            </div>

            <div style="margin-top:12px">
              <input id="pinInput" type="password" placeholder="Class PIN" />
              <div id="pinError" class="err"></div>
              <button id="pinContinueBtn" class="primary" type="button" style="margin-top:10px">Continue</button>
            </div>
          </div>
        </div>
      </div>
    </section>

    <section id="screen-name" class="screen">
      <div class="wrap">
        <div class="shell">
          <div class="card">
            <div class="row" style="justify-content:space-between;align-items:center">
              <div>
                <h2>Your Name</h2>
                <div class="muted">This is what others will see in chat.</div>
              </div>
              <button id="nameBackBtn" type="button">Back</button>
            </div>

            <div style="margin-top:12px">
              <input id="nameInput" type="text" placeholder="Display name" maxlength="28" />
              <div id="nameError" class="err"></div>
              <button id="nameContinueBtn" class="primary" type="button" style="margin-top:10px">Request Access</button>
            </div>
          </div>
        </div>
      </div>
    </section>

    <section id="screen-wait" class="screen">
      <div class="wrap">
        <div class="shell">
          <div class="card">
            <h2>Waiting for Approval</h2>
            <div class="muted">Keep this tab open — you’ll enter chat automatically once approved.</div>
            <div id="waitStatus" class="muted" style="margin-top:10px">…</div>
            <button id="resetBtn" type="button" style="margin-top:12px">Start over</button>
          </div>
        </div>
      </div>
    </section>

    <section id="screen-chat" class="screen">
      <div class="wrap" style="padding-top:22px">
        <div class="shell" style="width:min(1100px,96vw)">
          <div id="chat-screen" class="night">
            <div class="chat-header">
              <div>
                <h1 id="chatWelcome">Welcome!</h1>
                <div id="chatSubtitle" class="muted">SecureText chat</div>
              </div>
              <div class="chat-controls">
                <button id="themeToggle" type="button">🌙</button>
                <button id="logoutBtn" class="danger" type="button">Logout</button>
              </div>
            </div>

            <div style="margin-top:10px" class="card">
              <strong>Announcements</strong>
              <div id="announcementsList" style="margin-top:8px"></div>
            </div>

            <div id="chatStatus" class="muted" style="margin-top:10px"></div>
            <div id="messages" class="messages"></div>
            <div id="typingIndicator" style="margin-top:10px"></div>

            <div id="chat-input">
              <input id="msgInput" type="text" placeholder="Message…" autocomplete="off" />
              <button id="sendBtn" class="primary" type="button">Send</button>
            </div>
          </div>
        </div>
      </div>
    </section>
  </div>

  <script src="firebase.js"></script>
  <script src="app.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", function(){
      const btn=document.getElementById("adminPathBtn");
      if(btn) btn.onclick=()=>location.href="admin.html";
    });
  </script>
</body>
</html>
